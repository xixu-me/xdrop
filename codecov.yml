codecov:
  require_ci_to_pass: false
  notify:
    wait_for_ci: false

coverage:
  range: '80...90'
  round: down
  precision: 2
  status:
    project:
      default: false
      backend:
        target: 90%
        threshold: 0%
        if_ci_failed: error
        if_not_found: failure
        only_pulls: false
        flags:
          - backend
    patch:
      default:
        target: auto
        threshold: 0%
        if_ci_failed: error
        if_not_found: failure
        only_pulls: true
        flags:
          - backend

flags:
  backend:
    paths:
      - apps/api/
  frontend:
    paths:
      - apps/web/
