name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          notes="Automated release notes for $TAG."

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Leaving existing release notes intact."
            exit 0
          fi

          gh release create "$TAG" \
            --verify-tag \
            --title "Xdrop $TAG" \
            --generate-notes \
            --notes "$notes" \
            --latest
