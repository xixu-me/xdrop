version: 2
updates:
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    reviewers:
      - xixu-me
    commit-message:
      prefix: 'deps(bun)'
    groups:
      web-and-tooling:
        update-types:
          - minor
          - patch

  - package-ecosystem: gomod
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
      time: '09:30'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go
    reviewers:
      - xixu-me
    commit-message:
      prefix: 'deps(go)'
    groups:
      api-runtime:
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: weekly
      day: tuesday
      time: '09:00'
      timezone: Asia/Shanghai
    labels:
      - dependencies
      - docker
    reviewers:
      - xixu-me
    open-pull-requests-limit: 2
    commit-message:
      prefix: 'deps(docker-web)'

  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: weekly
      day: tuesday
      time: '09:10'
      timezone: Asia/Shanghai
    labels:
      - dependencies
      - docker
    reviewers:
      - xixu-me
    open-pull-requests-limit: 2
    commit-message:
      prefix: 'deps(docker-api)'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: wednesday
      time: '09:00'
      timezone: Asia/Shanghai
    labels:
      - dependencies
      - github-actions
    reviewers:
      - xixu-me
    open-pull-requests-limit: 3
    commit-message:
      prefix: 'deps(ci)'
